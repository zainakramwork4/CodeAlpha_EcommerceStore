<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav-bar">
      <a href="index.html" class="logo">market<span>.</span></a>
    </nav>
  </header>

  <main>
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to check out and view orders.</p>

      <div class="error-msg" id="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign In</button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Create one</a>
      </div>

      <div class="auth-switch" style="margin-top:8px; font-size:12px;">
        Demo admin: admin@codealpha.com / admin123
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
