<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace — Shop Quality Goods</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="site-header">
    <nav class="nav-bar">
      <a href="index.html" class="logo">market<span>.</span></a>
      <div class="nav-search">
        <input type="text" id="search-input" placeholder="Search products..." aria-label="Search products" />
      </div>
      <div class="nav-links">
        <a href="cart.html" class="nav-icon-btn">
          Cart
          <span class="cart-count" id="cart-count" style="display:none">0</span>
        </a>
        <a href="login.html" id="nav-account" class="nav-icon-btn">Sign In</a>
      </div>
    </nav>
    <div class="category-bar" id="category-bar">
      <button class="category-chip active" data-category="all">All</button>
      <button class="category-chip" data-category="Electronics">Electronics</button>
      <button class="category-chip" data-category="Fashion">Fashion</button>
      <button class="category-chip" data-category="Home & Kitchen">Home & Kitchen</button>
      <button class="category-chip" data-category="Sports & Fitness">Sports & Fitness</button>
      <button class="category-chip" data-category="Books">Books</button>
    </div>
  </header>

  <main id="main">
    <section class="hero">
      <h1>Goods worth keeping around.</h1>
      <p>A small, curated marketplace — built for the CodeAlpha Full Stack Development internship.</p>
    </section>

    <h2 class="section-title">All Products</h2>
    <div class="product-grid" id="product-grid">
      <!-- Products injected by JS -->
    </div>
  </main>

  <footer class="site-footer">
    Built as part of the CodeAlpha Full Stack Development Internship — Task 1: Simple E-commerce Store
  </footer>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
