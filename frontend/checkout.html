<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav-bar">
      <a href="index.html" class="logo">market<span>.</span></a>
      <div class="nav-links" style="margin-left:auto;">
        <a href="cart.html" class="nav-icon-btn">Cart</a>
        <a href="login.html" id="nav-account" class="nav-icon-btn">Sign In</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="checkout-page">
      <h2>Checkout</h2>

      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <div id="order-summary-mini" style="background:var(--color-card); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:20px; margin-bottom:24px;"></div>

      <form id="checkout-form">
        <h3 style="font-family: var(--font-display); font-size: 18px; margin-bottom: 16px;">Shipping Address</h3>
        <div class="form-group">
          <label for="street">Street Address</label>
          <input type="text" id="street" required />
        </div>
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" required />
        </div>
        <div class="form-group">
          <label for="postalCode">Postal Code</label>
          <input type="text" id="postalCode" required />
        </div>
        <div class="form-group">
          <label for="country">Country</label>
          <input type="text" id="country" required />
        </div>

        <h3 style="font-family: var(--font-display); font-size: 18px; margin: 24px 0 16px;">Payment Method</h3>
        <div class="form-group">
          <select id="paymentMethod">
            <option value="Cash on Delivery">Cash on Delivery</option>
            <option value="Credit Card">Credit Card (demo)</option>
            <option value="PayPal">PayPal (demo)</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="place-order-btn">Place Order</button>
      </form>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
